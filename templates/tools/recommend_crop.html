<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🌾 Best Crop Recommendation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f7faf8;
    }
    .container {
      max-width: 800px;
    }
    .card {
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .btn-success {
      background: #2e8b57;
      border: none;
    }
    .btn-success:hover {
      background: #256c45;
    }
    h1 {
      color: #2e8b57;
      font-weight: bold;
    }
  </style>
</head>
<body>

<!-- ✅ Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-success">
  <div class="container-fluid">
    <a class="navbar-brand text-white fw-bold" href="{{ url_for('home') }}">🌾 Smart Agriculture</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('home') }}">Home</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('ai_services') }}">AI Services</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('contact') }}">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- 🌾 Main Section -->
<div class="container my-5">
  <div class="card p-4">
    <h1 class="text-center mb-4">🌱 Best Crop Recommendation</h1>
    <p class="text-muted text-center mb-4">
      Enter your soil and weather details below to get the best crop recommendation.
    </p>

    <!-- 🧾 Input Form -->
    <form method="POST" action="{{ url_for('crop_recommendation') }}">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nitrogen (N)</label>
          <input type="number" step="0.01" name="N" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Phosphorus (P)</label>
          <input type="number" step="0.01" name="P" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Potassium (K)</label>
          <input type="number" step="0.01" name="K" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">pH Value</label>
          <input type="number" step="0.01" name="ph" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Temperature (°C)</label>
          <input type="number" step="0.01" name="temperature" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Humidity (%)</label>
          <input type="number" step="0.01" name="humidity" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Rainfall (mm)</label>
          <input type="number" step="0.01" name="rainfall" class="form-control" required>
        </div>
      </div>
      <div class="text-center mt-4">
        <button type="submit" class="btn btn-success px-5 py-2">Get Recommendation</button>
      </div>
    </form>

    <!-- 🌾 Output Section -->
    {% if recommendation %}
    <div class="alert alert-success mt-4 text-center">
      🌾 <strong>Recommended Crop:</strong> {{ recommendation }}
    </div>
    {% endif %}
  </div>
</div>

<!-- 🧭 Footer -->
<footer class="text-center text-white py-3 mt-5" style="background:#2e8b57;">
  © 2025 Smart Agriculture | AI Crop Recommendation System
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
