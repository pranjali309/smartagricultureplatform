<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f2f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .register-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 400px;
    }
    .btn-primary {
      width: 100%;
      font-weight: bold;
    }
    /* ✨ Fade effect for flash messages */
    .alert {
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
  </style>
</head>
<body>

<div class="register-box">
  <h3 class="text-center mb-4 fw-bold">Register</h3>

  <!-- ✅ Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show mt-2" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <!-- ✅ Registration form -->
  <form method="POST" enctype="multipart/form-data" action="{{ url_for('register') }}">
    <div class="mb-3">
      <label>Full Name:</label>
      <input type="text" name="fullname" class="form-control" required>
    </div>

    <div class="mb-3">
      <label>Email:</label>
      <input type="email" name="email" class="form-control" required>
    </div>

    <div class="mb-3">
      <label>Password:</label>
      <input type="password" name="password" class="form-control" required
             pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}"
             title="Password must have uppercase, lowercase, digit & special character.">
    </div>

    <div class="mb-3">
      <label>Phone:</label>
      <input type="text" name="phone" class="form-control"
             pattern="^(\d{10}|\d{12})$"
             placeholder="Enter 10 or 12 digit number"
             title="Enter either 10 or 12 digit phone number" required>
    </div>

    <div class="mb-3">
      <label>Address:</label>
      <textarea name="address" class="form-control" rows="2" required></textarea>
    </div>

    <div class="mb-3">
      <label>Profile Photo:</label>
      <input type="file" name="profile_photo" class="form-control">
    </div>

    <button type="submit" class="btn btn-primary">Register</button>
  </form>

  <p class="text-center mt-3">
    Already have an account? 
    <a href="{{ url_for('login') }}" class="fw-bold text-primary">Login here</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- 🔥 Auto-hide flash messages after 2 seconds -->
<script>
  setTimeout(() => {
    const alerts = document.querySelectorAll('.alert');
    alerts.forEach(alert => {
      alert.style.opacity = '0';
      alert.style.transform = 'translateY(-10px)';
      setTimeout(() => {
        const bsAlert = new bootstrap.Alert(alert);
        bsAlert.close();
      }, 800);
    });
  }, 2000); // 2 seconds
</script>

</body>
</html>
