<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rainfall Prediction</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #ccefff, #e6f7ff);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 0;
    }

    .container {
      background: white;
      width: 90%;
      max-width: 600px;
      border-radius: 16px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      padding: 30px 25px;
      text-align: center;
    }

    h1 {
      color: #0077b6;
      margin-bottom: 15px;
    }

    form {
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 80%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }

    button[type="submit"] {
      background-color: #0096c7;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 10px;
      transition: background 0.3s;
    }

    button[type="submit"]:hover {
      background-color: #0077b6;
    }

    .result {
      margin-top: 25px;
      background: #f7f9fb;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
    }

    .result h2 {
      color: #0077b6;
      margin-bottom: 10px;
    }

    canvas {
      margin-top: 25px;
      background: #fafafa;
      border-radius: 12px;
      padding: 10px;
      width: 100%;
    }

    .btn-container {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .btn {
      padding: 10px 25px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      text-decoration: none;
      color: white;
    }

    .btn-predict {
      background-color: #00b4d8;
    }

    .btn-predict:hover {
      background-color: #0096c7;
    }

    .btn-home {
      background-color: #48cae4;
      color: #023e8a;
    }

    .btn-home:hover {
      background-color: #90e0ef;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌧️ Rainfall Prediction</h1>

    <!-- Main Form -->
    <form method="POST">
      <input type="text" name="location" placeholder="Enter your location" required>
      <br>
      <button type="submit">Predict</button>
    </form>

    {% if predicted_rainfall %}
    <div class="result">
      <h2>📍 {{ location|capitalize }}</h2>
      <p><strong>Predicted Rainfall:</strong> {{ predicted_rainfall }} mm</p>
      <p><strong>Forecast:</strong> {{ message }}</p>
    </div>

    <canvas id="rainChart"></canvas>

    <!-- Buttons at bottom -->
    <div class="btn-container">
      <a href="/rainfall-prediction" class="btn btn-predict">🌦️ Predict Again</a>
      <a href="/" class="btn btn-home">🏠 Go to Home</a>
    </div>
    {% endif %}
  </div>

  {% if predicted_rainfall %}
  <script>
    const ctx = document.getElementById('rainChart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: {{ months|tojson }},
        datasets: [{
          label: 'Monthly Rainfall (mm)',
          data: {{ rainfall_values|tojson }},
          backgroundColor: 'rgba(0, 150, 199, 0.6)',
          borderColor: '#0077b6',
          borderWidth: 2,
          borderRadius: 6
        }]
      },
      options: {
        scales: {
          y: { beginAtZero: true }
        },
        plugins: {
          legend: {
            labels: { color: '#333' }
          }
        }
      }
    });
  </script>
  {% endif %}
</body>
</html>
