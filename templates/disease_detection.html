<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crop Disease Detection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-image: url("{{ url_for('static', filename='images/farm_bg.jpg') }}");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
    }
    .card {
      backdrop-filter: blur(8px);
      background-color: rgba(255, 255, 255, 0.85);
      border-radius: 20px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }
    .crop-img {
      max-height: 300px;
      object-fit: cover;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <h2 class="text-center mb-4 fw-bold text-success">🌱 Crop Disease Detection</h2>
    <p class="text-center text-dark mb-5">Upload an image of your crop to detect diseases and get recommended remedies.</p>

    <div class="row justify-content-center">
      <div class="col-md-8">
        <form method="POST" action="{{ url_for('disease_detection') }}" enctype="multipart/form-data" class="card p-4">
          <div class="mb-3">
            <label class="form-label">Upload Crop Image</label>
            <input type="file" name="leaf_image" class="form-control" accept="image/*" required>
          </div>
          <div class="text-center">
            <button class="btn btn-success px-4 mt-3">Detect Disease</button>
          </div>
        </form>
      </div>
    </div>

    {% if predicted_disease %}
      <div class="row justify-content-center mt-5">
        <div class="col-md-6">
          <div class="card text-center p-4">
            <h4 class="fw-bold text-success mb-3">🩺 Disease Detection Result</h4>

            <img src="{{ url_for('static', filename='uploads/' + image_filename) }}"
                 class="crop-img mb-3" alt="Uploaded Crop">

            <h5 class="text-dark">Detected Disease: <span class="text-danger">{{ predicted_disease }}</span></h5>
            <p class="fs-5 mt-2">Recommended Remedy: 
              <strong class="text-success">{{ remedy }}</strong>
            </p>

            <a href="{{ url_for('disease_detection') }}" class="btn btn-outline-secondary mt-2">🔁 Detect Again</a>
          </div>
        </div>
      </div>
    {% endif %}

    <div class="text-center mt-4">
      <a href="{{ url_for('home') }}" class="btn btn-outline-dark">⬅ Back to Home</a>
    </div>
  </div>
</body>
</html>
