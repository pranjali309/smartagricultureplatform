<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Climate Advisory System</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom right, #c8e6f5, #e0f7fa);
      min-height: 100vh;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 40px;
    }

    .container {
      background: white;
      width: 90%;
      max-width: 650px;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      color: #0077b6;
      font-size: 1.8rem;
      margin-bottom: 15px;
    }

    p.subtitle {
      color: #555;
      font-size: 1rem;
      margin-bottom: 25px;
    }

    form {
      display: grid;
      gap: 15px;
      margin-bottom: 25px;
    }

    input {
      padding: 10px 15px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 1rem;
      width: 100%;
    }

    button[type="submit"] {
      background-color: #0096c7;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    button[type="submit"]:hover {
      background-color: #0077b6;
    }

    .result-box {
      background-color: #f4f9ff;
      border-left: 5px solid #0077b6;
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
      text-align: left;
      animation: fadeIn 0.6s ease;
    }

    .result-box h2 {
      color: #0077b6;
      margin-bottom: 10px;
    }

    .result-box p {
      color: #333;
      line-height: 1.5;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .btn-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .btn {
      text-decoration: none;
      padding: 10px 25px;
      border-radius: 10px;
      font-size: 1rem;
      color: white;
      transition: 0.3s;
    }

    .btn-again {
      background: #00b4d8;
    }

    .btn-again:hover {
      background: #0096c7;
    }

    .btn-home {
      background: #48cae4;
      color: #023e8a;
    }

    .btn-home:hover {
      background: #90e0ef;
    }

  </style>
</head>
<body>
  <div class="container">
    <h1>🌦️ Climate Advisory System</h1>
    <p class="subtitle">AI-based smart suggestions for your farming decisions</p>

    <form method="POST">
      <input type="number" name="temperature" placeholder="Enter Temperature (°C)" step="0.1" required>
      <input type="number" name="humidity" placeholder="Enter Humidity (%)" step="0.1" required>
      <input type="number" name="rainfall" placeholder="Enter Rainfall (mm)" step="0.1" required>
      <button type="submit">View Advisory</button>
    </form>

    {% if advisory %}
    <div class="result-box">
      <h2>🌾 Climate Advisory</h2>
      <p><strong>Temperature:</strong> {{ temperature }} °C</p>
      <p><strong>Humidity:</strong> {{ humidity }} %</p>
      <p><strong>Rainfall:</strong> {{ rainfall }} mm</p>
      <hr>
      <p><strong>Advisory:</strong> {{ advisory }}</p>
    </div>

    <div class="btn-container">
      <a href="/climate-advisory" class="btn btn-again">🔄 Predict Again</a>
      <a href="/" class="btn btn-home">🏠 Go to Home</a>
    </div>
    {% endif %}
  </div>
</body>
</html>
