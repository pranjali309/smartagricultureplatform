<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f2f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 380px;
    }
    .btn-primary {
      width: 100%;
      font-weight: bold;
    }
    /* ✨ Fade animation for flash messages */
    .alert {
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h3 class="text-center mb-4 fw-bold">Login</h3>

  <!-- ✅ Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show mt-2" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST" action="{{ url_for('login') }}">
    <div class="mb-3">
      <label>Email:</label>
      <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
    </div>

    <div class="mb-3">
      <label>Password:</label>
      <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
    </div>

    <button class="btn btn-primary" type="submit">Login</button>
  </form>

  <p class="text-center mt-3">
    <a href="{{ url_for('forgot_password') }}" class="text-danger">Forgot Password?</a>
  </p>

  <p class="text-center mt-2">
    Don’t have an account?
    <a href="{{ url_for('register') }}" class="fw-bold text-primary">Register here</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- 🔥 Auto-hide flash messages after 2 seconds -->
<script>
  setTimeout(() => {
    const alerts = document.querySelectorAll('.alert');
    alerts.forEach(alert => {
      alert.style.opacity = '0';
      alert.style.transform = 'translateY(-10px)';
      setTimeout(() => {
        const bsAlert = new bootstrap.Alert(alert);
        bsAlert.close();
      }, 800);
    });
  }, 2000); // 2 seconds
</script>

</body>
</html>
