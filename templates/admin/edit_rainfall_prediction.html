<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Rainfall Prediction Record</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f8faf9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      max-width: 600px;
      width: 100%;
    }

    .card-header {
      background-color: #28a745;
      color: #fff;
      font-weight: 600;
      text-align: center;
      font-size: 1.2rem;
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
    }

    input.form-control:focus,
    textarea.form-control:focus {
      border-color: #28a745;
      box-shadow: 0 0 5px rgba(40, 167, 69, 0.5);
    }

    .btn-success {
      background-color: #28a745;
      border-color: #28a745;
    }

    .btn-success:hover {
      background-color: #19692c;
      border-color: #19692c;
    }

    .btn-secondary:hover {
      background-color: #6c757d;
      border-color: #6c757d;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header py-3">
    <h3 class="mb-0"><i class="bi bi-cloud-sun-rain me-2"></i>Edit Rainfall Prediction Record</h3>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">User Email</label>
        <input type="text" class="form-control" value="{{ row[1] }}" disabled style="background-color: #e9f7ef;">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Location</label>
        <input type="text" class="form-control" value="{{ row[2] }}" disabled style="background-color: #e9f7ef;">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Predicted Rainfall (mm)</label>
        <input type="number" step="0.1" class="form-control" name="predicted_rainfall" value="{{ row[3] }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Message</label>
        <textarea class="form-control" name="message" rows="3" required>{{ row[4] }}</textarea>
      </div>
      <div class="d-flex justify-content-end">
        <button type="submit" class="btn btn-success me-2"><i class="bi bi-check-circle me-1"></i>Update</button>
        <a href="{{ url_for('admin_rainfall_predictions') }}" class="btn btn-secondary"><i class="bi bi-arrow-left-circle me-1"></i>Cancel</a>
      </div>
    </form>
  </div>
</div>

</body>
</html>
