<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Price</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h3 class="text-success">Edit Price</h3>

  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Crop Name</label>
      <input type="text" class="form-control" name="crop_name" value="{{ price[1] }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Price</label>
      <input type="text" class="form-control" name="price" value="{{ price[2] }}" required>
    </div>
    <button type="submit" class="btn btn-success">Update</button>
    <a href="{{ url_for('admin_live_prices') }}" class="btn btn-secondary">Cancel</a>
  </form>
</div>

</body>
</html>
