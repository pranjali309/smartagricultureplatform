<table class="table table-striped">
  <thead>
    <tr>
      {% for header in headers %}
      <th>{{ header }}</th>
      {% endfor %}
      <th>Action</th>
    </tr>
  </thead>
  <tbody>
    {% for row in items %}
    <tr>
      <td>{{ row['id'] }}</td>
      <td>{{ row['temperature'] }}</td>
      <td>{{ row['humidity'] }}</td>
      <td>{{ row['soil_moisture'] }}</td>
      <td>{{ row['date_time'] }}</td>
      <td>
        <a href="{{ url_for(delete_url, id=row['id']) }}" class="btn btn-danger btn-sm">Delete</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
