<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ crop[1] }} | Crop Details</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #e8f5e9, #f8faf9);
      min-height: 100vh;
    }

    .crop-card {
      border-radius: 20px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      margin-top: 60px;
    }

    /* Image Section */
    .crop-image img {
      width: 100%;
      height: 100%;
      min-height: 100%;
      object-fit: cover;
    }

    .no-image {
      height: 100%;
      min-height: 300px;
      background: #f1f3f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #888;
    }

    /* Details */
    .crop-title {
      font-weight: 700;
      color: #2e7d32;
    }

    .info-box {
      background: #f8faf9;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 10px;
      font-size: 15px;
    }

    .info-box span {
      font-weight: 600;
      color: #2e7d32;
    }

    .desc-title {
      color: #2e7d32;
      font-weight: 600;
    }

    .desc-text {
      color: #555;
      line-height: 1.7;
    }

    .btn-back {
      border-radius: 30px;
      padding: 8px 25px;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .crop-image img {
        height: 250px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="crop-card">
    <div class="row g-0">

      <!-- IMAGE -->
      <div class="col-md-5 crop-image">
        {% if crop[7] %}
          <img src="{{ url_for('static', filename='uploads/' ~ crop[7]) }}" alt="{{ crop[1] }}">
        {% else %}
          <div class="no-image">No Image Available</div>
        {% endif %}
      </div>

      <!-- DETAILS -->
      <div class="col-md-7 p-4">
        <h2 class="crop-title mb-3">🌾 {{ crop[1] }}</h2>

        <div class="info-box">
          <span>Duration :</span> {{ crop[4] }}
        </div>

        <div class="info-box">
          <span>Fertilizer :</span> {{ crop[5] }}
        </div>

        <div class="info-box">
          <span>Sowing Season :</span> {{ crop[6] }}
        </div>

        <div class="info-box">
          <span>Expected Profit :</span> ₹{{ crop[6] }}
        </div>

        <div class="mt-4">
          <h5 class="desc-title">📖 Description</h5>
          <p class="desc-text">{{ crop[3] }}</p>
        </div>

        <a href="{{ url_for('view_crops') }}" class="btn btn-outline-success btn-back mt-3">
          ← Back to Crops
        </a>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
