<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Farm Data</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
/* Sidebar & Topbar styling omitted for brevity */
</style>
</head>
<body>
<div class="container mt-4">

<h2>Edit Farm Data</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endif %}
{% endwith %}

<form method="POST">
    <div class="mb-3">
        <label for="temperature" class="form-label">Temperature</label>
        <input type="number" step="0.1" class="form-control" id="temperature" name="temperature" value="{{ row.temperature }}" required>
    </div>
    <div class="mb-3">
        <label for="humidity" class="form-label">Humidity</label>
        <input type="number" step="0.1" class="form-control" id="humidity" name="humidity" value="{{ row.humidity }}" required>
    </div>
    <div class="mb-3">
        <label for="soil_moisture" class="form-label">Soil Moisture</label>
        <input type="number" step="0.1" class="form-control" id="soil_moisture" name="soil_moisture" value="{{ row.soil_moisture }}" required>
    </div>
    <div class="mb-3">
        <label for="date_time" class="form-label">Date & Time</label>
        <input type="datetime-local" class="form-control" id="date_time" name="date_time" value="{{ row.date_time|datetimeformat }}" required>
    </div>
    <button type="submit" class="btn btn-success">Update</button>
    <a href="{{ url_for('admin_farm_insights') }}" class="btn btn-secondary">Cancel</a>
</form>

<form action="{{ url_for('admin_delete_farm_data', id=row.id) }}" method="POST" class="mt-2">
    <button type="submit" class="btn btn-danger">Delete</button>
</form>

</div>
</body>
</html>
