<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Yield Prediction</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4 rounded-4">
    <h3 class="text-success mb-4">✏ Edit Yield Prediction</h3>

    <form method="POST">

      <div class="mb-3">
        <label class="form-label">Crop Name</label>
        <input type="text" class="form-control" value="{{ row[2] }}" readonly>
      </div>

      <div class="mb-3">
        <label class="form-label">Soil Type</label>
        <input type="text" class="form-control" value="{{ row[3] }}" readonly>
      </div>

      <div class="mb-3">
        <label class="form-label">Rainfall (mm)</label>
        <input type="number" step="0.1" name="rainfall" class="form-control" value="{{ row[4] }}" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Temperature (°C)</label>
        <input type="number" step="0.1" name="temperature" class="form-control" value="{{ row[5] }}" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Humidity (%)</label>
        <input type="number" step="0.1" name="humidity" class="form-control" value="{{ row[6] }}" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Fertilizer (kg/acre)</label>
        <input type="number" step="0.1" name="fertilizer" class="form-control" value="{{ row[7] }}" required>
      </div>

      <div class="d-flex justify-content-between mt-4">

        <a href="{{ url_for('admin_yield_predictions') }}" class="btn btn-secondary">
          ❌ Cancel
        </a>

        <button type="submit" class="btn btn-success">
          💾 Update
        </button>

      </div>

    </form>
  </div>
</div>

</body>
</html>
