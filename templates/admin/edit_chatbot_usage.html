<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Chatbot Log | Smart Agriculture</title>

<!-- CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background-color: #f8faf9;
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card styling */
.card {
    width: 100%;
    max-width: 600px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.card-header {
    background: #28a745;
    color: #fff;
    font-weight: 600;
    font-size: 1.3rem;
    text-align: center;
    border-top-left-radius: 15px;
    border-top-right-radius: 15px;
}

.btn-success {
    background-color: #28a745;
    border-color: #28a745;
}
.btn-secondary {
    background-color: #6c757d;
    border-color: #6c757d;
}
</style>
</head>
<body>

<div class="card">
    <div class="card-header py-3">
        <h3><i class="bi bi-chat-dots me-2"></i>Edit Chatbot Log</h3>
    </div>
    <div class="card-body p-4">
        <form method="POST">
            <div class="mb-3">
                <label for="user_choice" class="form-label">User Query</label>
                <input type="text" class="form-control" id="user_choice" name="user_choice" value="{{ row[2] }}" required>
            </div>

            <div class="mb-3">
                <label for="bot_reply" class="form-label">Bot Response</label>
                <textarea class="form-control" id="bot_reply" name="bot_reply" rows="4" required>{{ row[3] }}</textarea>
            </div>

            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-success">Update</button>
                <a href="{{ url_for('admin_chatbot_logs') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
