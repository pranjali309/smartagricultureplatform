<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Climate Advisory | Smart Agriculture</title>

  <!-- CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f8faf9;
      margin: 0;
      padding: 30px 0;
    }

    /* Centered Card */
    .card {
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      max-width: 700px;
      margin: 0 auto;
    }

    .card-header {
      background: #28a745;
      color: #fff;
      font-weight: 600;
      font-size: 1.2rem;
      text-align: center;
      border-radius: 15px 15px 0 0;
    }

    input.form-control:focus,
    textarea.form-control:focus {
      box-shadow: 0 0 6px rgba(40, 167, 69, 0.5);
      border-color: #28a745 !important;
    }

    .btn-success:hover {
      background-color: #19692c;
      border-color: #19692c;
    }

    .btn-secondary:hover {
      background-color: #6c757d;
      border-color: #6c757d;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <div class="card-header py-3">
        <h3 class="mb-0"><i class="bi bi-cloud-fog2 me-2"></i>Edit Climate Advisory</h3>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Temperature (°C)</label>
            <input type="number" name="temperature" class="form-control" value="{{ row[2] }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Humidity (%)</label>
            <input type="number" name="humidity" class="form-control" value="{{ row[3] }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Rainfall (mm)</label>
            <input type="number" name="rainfall" class="form-control" value="{{ row[4] }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Advisory</label>
            <textarea name="advisory" class="form-control" rows="4" required>{{ row[5] }}</textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success"><i class="bi bi-check-circle me-1"></i> Update</button>
            <a href="{{ url_for('admin_climate_advisories') }}" class="btn btn-secondary"><i class="bi bi-arrow-left-circle me-1"></i> Back</a>
          </div>
        </form>
      </div>
    </div>
  </div>

</body>
</html>
