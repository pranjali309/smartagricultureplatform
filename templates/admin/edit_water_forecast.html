<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Water Forecast | Smart Agriculture</title>

<!-- CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background-color: #f8faf9;
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card styling */
.card {
    width: 100%;
    max-width: 700px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.card-header {
    background: #28a745;
    color: #fff;
    font-weight: 600;
    font-size: 1.3rem;
    text-align: center;
    border-top-left-radius: 15px;
    border-top-right-radius: 15px;
}

.btn-success {
    background-color: #28a745;
    border-color: #28a745;
}
.btn-secondary {
    background-color: #6c757d;
    border-color: #6c757d;
}
</style>
</head>
<body>

<div class="card">
    <div class="card-header py-3">
        <h3><i class="bi bi-pencil-square me-2"></i>Edit Water Forecast</h3>
    </div>
    <div class="card-body p-4">
        <form method="POST" action="{{ url_for('admin_edit_water_forecast', id=row[0]) }}">
            <div class="mb-3">
                <label for="user_email" class="form-label">User Email</label>
                <input type="email" class="form-control" id="user_email" name="user_email" value="{{ row[1] }}" readonly>
            </div>

            <div class="mb-3">
                <label for="crop" class="form-label">Crop</label>
                <input type="text" class="form-control" id="crop" name="crop" value="{{ row[2] }}" required>
            </div>

            <div class="mb-3">
                <label for="water_need" class="form-label">Water Need</label>
                <input type="text" class="form-control" id="water_need" name="water_need" value="{{ row[3] }}" required>
            </div>

            <div class="mb-3">
                <label for="advice" class="form-label">Advice</label>
                <textarea class="form-control" id="advice" name="advice" rows="3" required>{{ row[4] }}</textarea>
            </div>

            <div class="mb-3">
                <label for="next_irrigation" class="form-label">Next Irrigation Date</label>
                <input type="date" class="form-control" id="next_irrigation" name="next_irrigation" value="{{ row[5] }}" required>
            </div>

            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-success">Update</button>
                <a href="{{ url_for('admin_water_forecasts') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
