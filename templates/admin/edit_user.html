<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>
<div class="container mt-5">
    <h2 class="mb-4 text-center">Edit User</h2>

    <form method="POST" enctype="multipart/form-data" class="card p-4 shadow">

        <label class="form-label">Full Name</label>
        <input type="text" name="fullname" class="form-control" value="{{ user[1] }}" required>

        <label class="form-label mt-3">Email</label>
        <input type="email" name="email" class="form-control" value="{{ user[2] }}" required>

        <label class="form-label mt-3">Password</label>
        <input type="password" name="password" class="form-control" value="{{ user[3] }}">

        <label class="form-label mt-3">Phone</label>
        <input type="text" name="phone" class="form-control" value="{{ user[4] }}">

        <label class="form-label mt-3">Address</label>
        <textarea name="address" class="form-control">{{ user[5] }}</textarea>

        <label class="form-label mt-3">Role</label>
        <select name="role" class="form-select" required>
            <option value="user" {% if user[7]=='user' %}selected{% endif %}>User</option>
            <option value="admin" {% if user[7]=='admin' %}selected{% endif %}>Admin</option>
        </select>

        <label class="form-label mt-3">Profile Photo</label>
        {% if user[6] %}
            <div class="mb-2">
                <img src="{{ url_for('static', filename='uploads/' ~ user[6]) }}" 
                     alt="Profile Photo" style="width:100px; height:100px; object-fit:cover; border-radius:50%;">
            </div>
        {% endif %}
        <input type="file" name="profile_photo" class="form-control">

        <button type="submit" class="btn btn-success mt-4">Update User</button>
        <a href="/admin/manage-users" class="btn btn-secondary mt-4">Cancel</a>

    </form>
</div>
</body>
</html>
