<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Contact Message | Smart Agriculture</title>

<!-- CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background-color: #f8faf9;
    margin: 0;
}

/* Main Content */
.main-content {
    padding: 50px 20px;
    max-width: 800px;
    margin: 0 auto;
}

.card {
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.card-header {
    background: #28a745;
    color: #fff;
    font-weight: 600;
    font-size: 1.2rem;
    text-align: center;
}

.btn-spacing {
    margin-right: 10px;
}
</style>
</head>
<body>

<!-- Main Content -->
<div class="main-content">

<div class="card shadow-sm border-0">
    <div class="card-header py-3">
        <h3 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Edit Contact Message</h3>
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('admin_edit_contact_message', id=msg[0]) }}">
            
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control" value="{{ msg[1] }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="{{ msg[2] }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control" value="{{ msg[3] }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea name="message" class="form-control" rows="5" required>{{ msg[4] }}</textarea>
            </div>

            <button type="submit" class="btn btn-success btn-spacing">
                <i class="bi bi-save me-1"></i> Update
            </button>
            <a href="{{ url_for('admin_contact_messages') }}" class="btn btn-secondary">
                <i class="bi bi-x-circle me-1"></i> Cancel
            </a>
        </form>
    </div>
</div>

</div>


<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
