<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Seed Quality Usage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa; /* optional light background for page */
        }

        /* Card styling (the form) */
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 720px;
            overflow: hidden;
            background-color: #ffffff; /* form background color */
        }

        .card-header {
            background: #28a745;
            color: #fff;
            font-weight: 600;
            font-size: 1.4rem;
            text-align: center;
        }

        .card-body {
            padding: 2rem;
        }

        .form-control, .form-select {
            border-radius: 10px;
            padding: 0.75rem 1rem;
            border: 1px solid #ced4da;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #28a745;
            box-shadow: 0 0 8px rgba(40,167,69,0.3);
        }

        label {
            font-weight: 600;
        }

        .btn-success {
            background: #28a745;
            border: none;
            border-radius: 10px;
            padding: 0.7rem 1.5rem;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-secondary {
            border-radius: 10px;
            padding: 0.7rem 1.5rem;
            font-size: 1rem;
        }

        .img-thumbnail {
            border-radius: 10px;
            width: 120px;
            height: 120px;
            object-fit: cover;
        }

        @media (max-width: 576px) {
            .row > .col-md-4 {
                margin-bottom: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="card shadow-lg">
    <div class="card-header py-3">
        <h3 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Edit Seed Quality Usage</h3>
    </div>

    <div class="card-body">
        <form method="POST" action="{{ url_for('admin_edit_seed_quality_usage', id=row[0]) }}" enctype="multipart/form-data">
            
            <div class="mb-4">
                <label for="user_email">User Email</label>
                <input type="email" class="form-control" id="user_email" name="user_email" value="{{ row[1] }}" required>
            </div>

            <div class="mb-4">
                <label for="seed_type">Seed Type</label>
                <input type="text" class="form-control" id="seed_type" name="seed_type" value="{{ row[2] }}" required>
            </div>

            <div class="row mb-4">
                <div class="col-md-4">
                    <label for="sample_size">Sample Size</label>
                    <input type="number" class="form-control" id="sample_size" name="sample_size" value="{{ row[3] }}" required>
                </div>
                <div class="col-md-4">
                    <label for="moisture">Moisture</label>
                    <input type="number" step="0.1" class="form-control" id="moisture" name="moisture" value="{{ row[4] }}" required>
                </div>
                <div class="col-md-4">
                    <label for="purity">Purity</label>
                    <input type="number" step="0.1" class="form-control" id="purity" name="purity" value="{{ row[5] }}" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="predicted_viability">Predicted Viability</label>
                <input type="number" step="0.1" class="form-control" id="predicted_viability" name="predicted_viability" value="{{ row[7] }}" required>
            </div>

            <div class="mb-4">
                <label for="recommendation">Recommendation</label>
                <textarea class="form-control" id="recommendation" name="recommendation" rows="3">{{ row[8] }}</textarea>
            </div>

            <div class="mb-4">
                <label>Current Image</label><br>
                {% if row[6] %}
                    <img src="{{ url_for('static', filename='uploads/' ~ row[6]) }}" class="img-thumbnail">
                {% else %}
                    <span class="text-muted">No Image</span>
                {% endif %}
            </div>

            <div class="mb-4">
                <label for="image">Upload New Image (optional)</label>
                <input type="file" class="form-control" id="image" name="image" accept="image/*">
            </div>

            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-success"><i class="bi bi-check-circle me-2"></i>Update</button>
                <a href="{{ url_for('admin_seed_quality') }}" class="btn btn-secondary"><i class="bi bi-arrow-left-circle me-2"></i>Back</a>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
