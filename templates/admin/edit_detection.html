<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Disease Detection | Smart Agriculture</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
        }

        .edit-page-wrapper {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }

        .header-bar {
            background: #28a745;
            padding: 20px 40px;
            text-align: center;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            margin-bottom: 35px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 600px;
        }

        .form-container {
            width: 100%;
            max-width: 550px; /* Increased form size */
            background: white;
            padding: 40px 50px; /* More spacious padding */
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #28a745;
            box-shadow: 0 0 8px rgba(40,167,69,0.3);
        }

        .button-row {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        .btn-save {
            flex: 1;
            background: #28a745;
            border: none;
            padding: 14px;
            font-size: 16px;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-save:hover {
            background: #218838;
        }

        .btn-cancel {
            flex: 1;
            background: #6c757d;
            color: white;
            padding: 14px;
            text-align: center;
            border-radius: 6px;
            text-decoration: none;
        }

        .btn-cancel:hover {
            background: #5a6268;
        }

        .image-preview {
            margin-top: 30px;
            text-align: center;
        }

        .image-preview img {
            max-width: 300px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        @media (max-width: 576px) {
            .form-container {
                padding: 25px 20px;
            }
            .header-bar {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>

<div class="edit-page-wrapper">

    <div class="header-bar">
        <h2><i class="bi bi-pencil-square me-2"></i>Edit Disease Detection</h2>
    </div>

    <div class="form-container">

        <form method="POST" enctype="multipart/form-data">

            <div class="form-group">
                <label><i class="bi bi-envelope-fill me-1"></i> User Email</label>
                <input type="email" name="user_email"
                       value="{{ row.user_email or row[1] }}" required>
            </div>

            <div class="form-group">
                <label><i class="bi bi-bug-fill me-1"></i> Predicted Disease</label>
                <input type="text" name="predicted_disease"
                       value="{{ row.predicted_disease or row[3] }}" required>
            </div>

            <div class="form-group">
                <label><i class="bi bi-lightbulb-fill me-1"></i> Remedy</label>
                <textarea name="remedy" rows="5" required>{{ row.remedy or row[4] }}</textarea>
            </div>

            <div class="button-row">
                <button type="submit" class="btn-save">
                    <i class="bi bi-check-circle-fill me-2"></i> Update
                </button>

                <a href="{{ url_for('admin_disease_detections') }}" class="btn-cancel">
                    <i class="bi bi-x-circle-fill me-2"></i> Cancel
                </a>
            </div>

        </form>

        {% if row.image %}
        <div class="image-preview">
            <h4>Current Image</h4>
            <img src="{{ url_for('static', filename='uploads/' ~ row.image) }}">
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
