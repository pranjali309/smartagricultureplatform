<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Mixed Crop Record</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            min-height: 100vh;
        }

        .form-container {
            max-width: 900px;
            margin: 50px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 30px;
            font-weight: 600;
            color: #333;
        }

        .btn-success {
            background-color: #28a745;
            border-color: #28a745;
        }

        .btn-secondary {
            background-color: #6c757d;
            border-color: #6c757d;
        }

        @media (max-width: 576px) {
            .form-container {
                margin: 20px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2 class="text-center">Edit Mixed Crop Record</h2>
    <form method="POST" action="">
        <div class="mb-3">
            <label for="user_email" class="form-label">User Email</label>
            <input type="email" class="form-control" id="user_email" name="user_email" value="{{ row[1] }}" required>
        </div>

        <div class="mb-3">
            <label for="main_crop" class="form-label">Main Crop</label>
            <input type="text" class="form-control" id="main_crop" name="main_crop" value="{{ row[2] }}" required>
        </div>

        <div class="mb-3">
            <label for="compatible_crops" class="form-label">Compatible Crops</label>
            <input type="text" class="form-control" id="compatible_crops" name="compatible_crops" value="{{ row[3] }}" required>
        </div>

        <div class="mb-3">
            <label for="created_at" class="form-label">Created At</label>
            <input type="text" class="form-control" id="created_at" name="created_at" value="{{ row[4] }}" readonly>
        </div>

        <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-success">Save Changes</button>
            <a href="{{ url_for('admin_mixed_crops') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
