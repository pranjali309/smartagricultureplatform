<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Recommendation | Smart Agriculture</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f8faf9;
      margin: 0;
      padding: 0;
    }

    .main-content {
      padding: 30px;
      max-width: 1200px;
      margin: auto;
    }

    .card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s;
      background-color: #ffffff;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .table-hover tbody tr:hover {
      background-color: #e9f7ef;
    }

    .table {
      border-radius: 0.5rem;
      overflow: hidden;
    }

    input.form-control:focus {
      border-color: #28a745;
      box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25);
      transition: all 0.2s ease-in-out;
    }

    footer {
      background: #2e8b57;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- Main Content -->
  <div class="main-content">
    <div class="container my-5">
      <h2 class="text-success mb-4 text-center fw-bold">Edit Recommendation</h2>

      <div class="card shadow-sm border-0 rounded-4 p-4">
        <div class="table-responsive mb-4">
          <table class="table table-striped table-hover table-bordered align-middle text-center">
            <thead class="table-success">
              <tr>
                <th>ID</th>
                <th>Soil Type</th>
                <th>N</th>
                <th>P</th>
                <th>K</th>
                <th>pH</th>
                <th>Temp (°C)</th>
                <th>Humidity (%)</th>
                <th>Rainfall (mm)</th>
              </tr>
            </thead>
            <tbody>
              <tr class="table-info">
                <td>1</td>
                <td>Loamy</td>
                <td>50</td>
                <td>30</td>
                <td>20</td>
                <td>6.5</td>
                <td>25</td>
                <td>70</td>
                <td>100</td>
              </tr>
            </tbody>
          </table>
        </div>

        <form method="POST">
          <div class="row g-3 mb-4">
            <div class="col-md-3">
              <label for="soil_type" class="form-label fw-semibold">Soil Type</label>
              <input type="text" class="form-control form-control-lg" id="soil_type" name="soil_type" value="Loamy" required>
            </div>
            <div class="col-md-3">
              <label for="nitrogen" class="form-label fw-semibold">Nitrogen (N)</label>
              <input type="number" step="0.01" class="form-control" id="nitrogen" name="nitrogen" value="50" required>
            </div>
            <div class="col-md-3">
              <label for="phosphorus" class="form-label fw-semibold">Phosphorus (P)</label>
              <input type="number" step="0.01" class="form-control" id="phosphorus" name="phosphorus" value="30" required>
            </div>
            <div class="col-md-3">
              <label for="potassium" class="form-label fw-semibold">Potassium (K)</label>
              <input type="number" step="0.01" class="form-control" id="potassium" name="potassium" value="20" required>
            </div>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-md-3">
              <label for="ph" class="form-label fw-semibold">pH</label>
              <input type="number" step="0.01" class="form-control" id="ph" name="ph" value="6.5" required>
            </div>
            <div class="col-md-3">
              <label for="temperature" class="form-label fw-semibold">Temperature (°C)</label>
              <input type="number" step="0.01" class="form-control" id="temperature" name="temperature" value="25" required>
            </div>
            <div class="col-md-3">
              <label for="humidity" class="form-label fw-semibold">Humidity (%)</label>
              <input type="number" step="0.01" class="form-control" id="humidity" name="humidity" value="70" required>
            </div>
            <div class="col-md-3">
              <label for="rainfall" class="form-label fw-semibold">Rainfall (mm)</label>
              <input type="number" step="0.01" class="form-control" id="rainfall" name="rainfall" value="100" required>
            </div>
          </div>

          <div class="d-flex justify-content-center gap-3 mt-4">
            <button type="submit" class="btn btn-success btn-lg shadow-sm">
              <i class="bi bi-check-circle me-2"></i> Update
            </button>
            <a href="{{ url_for('admin_recommendations') }}" class="btn btn-secondary btn-lg shadow-sm">
              <i class="bi bi-x-circle me-2"></i> Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    © 2025 Smart Agriculture | Admin Panel
  </footer>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
