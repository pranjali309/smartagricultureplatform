<!DOCTYPE html>
<html>
<head>
  <title>Update Farm Location</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">

<h2>Update Your Farm Location</h2>
<form method="POST">
  <div class="mb-3">
    <label class="form-label">Latitude</label>
    <input type="text" class="form-control" name="latitude" value="{{ latitude }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Longitude</label>
    <input type="text" class="form-control" name="longitude" value="{{ longitude }}" required>
  </div>
  <button type="submit" class="btn btn-success">Update Location</button>
</form>

</body>
</html>
